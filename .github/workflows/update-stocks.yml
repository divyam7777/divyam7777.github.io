name: Update NSE EMA scanner data

on:
  schedule:
    # Runs at 11:10 PM IST, Monday-Friday. GitHub Actions cron is UTC.
    - cron: "45 17 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate full-market scanner data
        run: python scripts/scan-nse-ema.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site with latest scanner data
        run: npm run build

      - name: Commit updated scanner data and Pages fallback
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update NSE EMA scanner data"
          file_pattern: public/stocks/data/*.json dist/stocks/data/*.json stocks/data/*.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy updated scanner to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
