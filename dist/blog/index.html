<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Technical writing by Divyam Matia on DevOps, cloud infrastructure, and platform engineering." />
    <title>Blog | Divyam Matia</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #070b16;
        --surface: rgba(15, 20, 35, 0.78);
        --text: #edf2ff;
        --muted: #a7b0c5;
        --line: rgba(237, 242, 255, 0.12);
        --accent: #8ea5ff;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(142, 165, 255, 0.18), transparent 30%),
          radial-gradient(circle at bottom right, rgba(49, 87, 255, 0.18), transparent 28%),
          var(--bg);
        color: var(--text);
      }

      main {
        width: min(760px, calc(100% - 40px));
        border: 1px solid var(--line);
        border-radius: 32px;
        padding: clamp(28px, 6vw, 56px);
        background: var(--surface);
        backdrop-filter: blur(18px);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }

      .eyebrow {
        margin: 0 0 16px;
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(2.4rem, 8vw, 5rem);
        line-height: 0.95;
        letter-spacing: -0.07em;
      }

      p {
        max-width: 620px;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.8;
      }

      a {
        display: inline-flex;
        margin-top: 18px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 13px 18px;
        color: var(--text);
        text-decoration: none;
        transition: transform 180ms ease, border-color 180ms ease;
      }

      a:hover {
        transform: translateY(-2px);
        border-color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Divyam Matia ? Blog</p>
      <h1>Notes from the infrastructure layer.</h1>
      <p>
        This space is ready for technical writing on DevOps, cloud infrastructure, CI/CD, Kubernetes, Terraform, and platform engineering. Articles will be added here as the blog grows.
      </p>
      <a href="/">Back to portfolio</a>
    </main>
  </body>
</html>
